<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HMS | Sign Up</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col justify-center py-12 sm:px-6 lg:px-8">
    <div class="sm:mx-auto sm:w-full sm:max-w-md">
        <h2 class="mt-6 text-center text-3xl font-extrabold text-slate-900 tracking-tight">Hospital Management System</h2>
        <p class="mt-2 text-center text-sm text-slate-600">
            Create an HMS account as Doctor or Patient.
        </p>
    </div>

    <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-lg">
        <div class="bg-white py-8 px-4 shadow sm:rounded-lg sm:px-10 border border-slate-100">
            {% if messages %}
            <div class="mb-4 space-y-2">
                {% for message in messages %}
                <div class="p-3 text-sm {% if message.tags == 'error' %}text-red-700 bg-red-50 border border-red-100{% else %}text-emerald-700 bg-emerald-50 border border-emerald-100{% endif %} rounded-md">
                    {{ message }}
                </div>
                {% endfor %}
            </div>
            {% endif %}

            <form class="space-y-6" action="{% url 'signup' %}" method="POST">
                {% csrf_token %}
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700">Username</label>
                        <input type="text" name="username" required class="mt-1 w-full px-3 py-2 border border-slate-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 text-sm">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700">Email Address</label>
                        <input type="email" name="email" required class="mt-1 w-full px-3 py-2 border border-slate-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 text-sm">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700">First Name</label>
                        <input type="text" name="first_name" required class="mt-1 w-full px-3 py-2 border border-slate-300 rounded-md shadow-sm text-sm">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700">Last Name</label>
                        <input type="text" name="last_name" required class="mt-1 w-full px-3 py-2 border border-slate-300 rounded-md shadow-sm text-sm">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-700">Password</label>
                    <input type="password" name="password" required class="mt-1 w-full px-3 py-2 border border-slate-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 text-sm">
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-700">User Role</label>
                    <select id="roleSelect" name="role" required class="mt-1 w-full px-3 py-2 border border-slate-300 rounded-md shadow-sm bg-white text-sm" onchange="toggleRoleFields()">
                        <option value="PATIENT">Patient</option>
                        <option value="DOCTOR">Doctor</option>
                    </select>
                </div>

                <!-- Patient Specific Fields -->
                <div id="patientFields" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700">Date of Birth</label>
                        <input type="date" name="date_of_birth" class="mt-1 w-full px-3 py-2 border border-slate-300 rounded-md shadow-sm text-sm">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700">Phone</label>
                        <input type="text" name="phone" class="mt-1 w-full px-3 py-2 border border-slate-300 rounded-md shadow-sm text-sm">
                    </div>
                </div>

                <!-- Doctor Specific Fields -->
                <div id="doctorFields" class="hidden space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700">Specialty</label>
                        <input type="text" name="specialty" value="Cardiology" class="mt-1 w-full px-3 py-2 border border-slate-300 rounded-md shadow-sm text-sm">
                    </div>
                </div>

                <div>
                    <button type="submit" class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
                        Sign up
                    </button>
                </div>
            </form>

            <div class="mt-6 text-center">
                <a href="{% url 'login' %}" class="text-sm font-medium text-blue-600 hover:text-blue-500">
                    Already have an account? Sign In
                </a>
            </div>
        </div>
    </div>

    <script>
        function toggleRoleFields() {
            var select = document.getElementById("roleSelect");
            var patientDiv = document.getElementById("patientFields");
            var doctorDiv = document.getElementById("doctorFields");
            if (select.value === "DOCTOR") {
                patientDiv.classList.add("hidden");
                doctorDiv.classList.remove("hidden");
            } else {
                patientDiv.classList.remove("hidden");
                doctorDiv.classList.add("hidden");
            }
        }
    </script>
</body>
</html>
